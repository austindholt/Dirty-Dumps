name: Weekly SEO Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 1"

permissions:
  contents: read

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run static SEO audit
        run: npm run seo:audit

      - name: Upload SEO audit report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-seo-audit
          path: reports/seo-audit.md
